name: 'Gordian Open Integrity Validation'
description: 'Gordian Open Integrity provenance and commit signatures on a repository'
author: 'Stream44'

inputs:
  mark:
    description: 'Published provenance mark to verify against'
    required: false
    default: ''
  strict-signers-all-authorized:
    description: 'Require all commit signers to be authorized in the Gordian envelope (default: false)'
    required: false
    default: 'false'
  strict-repo-identifier-is-inception-commit:
    description: 'Require the repository identifier to match the inception commit (default: false)'
    required: false
    default: 'false'

branding:
  icon: 'shield'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install --frozen-lockfile

    - name: Read current mark
      id: read-mark
      shell: bash
      run: |
        MARK="${{ inputs.mark }}"
        if [[ -z "$MARK" ]]; then
          PROVENANCE_FILE=".o/GordianOpenIntegrity.yaml"
          if [[ -f "$PROVENANCE_FILE" ]]; then
            MARK=$(grep -oP '"mark":\s*"\K[^"]+' "$PROVENANCE_FILE" || true)
          fi
        fi
        echo "mark=$MARK" >> "$GITHUB_OUTPUT"

    - name: Gordian Open Integrity
      shell: bash
      run: |
        MARK_FLAG=""
        if [[ -n "${{ steps.read-mark.outputs.mark }}" ]]; then
          MARK_FLAG="--mark ${{ steps.read-mark.outputs.mark }}"
        fi
        STRICT_FLAGS=""
        if [[ "${{ inputs.strict-signers-all-authorized }}" == "true" ]]; then
          STRICT_FLAGS="$STRICT_FLAGS --strict-signers-all-authorized"
        fi
        if [[ "${{ inputs.strict-repo-identifier-is-inception-commit }}" == "true" ]]; then
          STRICT_FLAGS="$STRICT_FLAGS --strict-repo-identifier-is-inception-commit"
        fi
        bun ${{ github.action_path }}/bin/oi validate GordianOpenIntegrity $MARK_FLAG $STRICT_FLAGS
